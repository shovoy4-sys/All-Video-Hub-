        .hero h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #ffaa44, #ff44aa, #44ffaa);

        .image-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;

            border: 2px solid rgba(255,255,255,0.15);

            animation: borderGlow 2s infinite alternate;
        }

        /* ছবির ওপরের প্লে বাটন ডিজাইন */
        .image-card::after {
            content: '▶';
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid white;
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;

            transition: 0.3s;
            backdrop-filter: blur(2px);
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .image-card:hover::after {
            background: rgba(255, 255, 255, 0.6);
            transform: translate(-50%, -50%) scale(1.1);
        }

        @keyframes borderGlow {
            from { border-color: rgba(255,100,100,0.3); box-shadow: 0 0 5px rgba(255,0,0,0.2); }
            to { border-color: rgba(100,255,100,0.7); box-shadow: 0 0 20px rgba(0,255,0,0.4); }
        }

        .image-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #ffaa44;
            box-shadow: 0 0 30px #ffaa44;
        }

        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            filter: brightness(0.85);
            transition: filter 0.3s;
        }

        .image-card:hover img {
            filter: brightness(1);
        }

        .card-title {
            text-align: center;
            padding: 12px;
            background: rgba(0,0,0,0.7);
            color: #ffdd99;
            font-weight: bold;
            font-size: 0.9rem;
            position: relative;

        footer {

            border-radius: 10px;
        }

    // লোডিং এবং অ্যানিমেশন সহ সকল ছবি লোড করুন
    function loadAllSections() {
        sectionsData.forEach(section => {
            const container = document.getElementById(section.name);
            if(!container) return;
            
            // ক্লিয়ার করে ফেলা (যদি আগে কিছু থাকে)
            container.innerHTML = '';
            
            section.images.forEach((img, idx) => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.setAttribute('data-link', img.link);
                
                const image = document.createElement('img');
                image.src = img.url;
                image.alt = img.title;
                image.loading = 'lazy'; // লেজি লোডিং
                
                // ইমেজ লোড না হলে placeholder
                image.onerror = function() {
                    this.src = 'https://via.placeholder.com/400x200?text=Image+Preview';
                };
                
                const titleDiv = document.createElement('div');
                titleDiv.className = 'card-title';
                titleDiv.textContent = `${img.title}`;
                
                card.appendChild(image);
                card.appendChild(titleDiv);
                
                // ক্লিক ইভেন্ট - সরাসরি লিংক ওপেন
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const link = card.getAttribute('data-link');
                    if(link && link !== '#') {
                        window.open(link, '_blank');
                    } else {
                        console.warn('লিংক পাওয়া যায়নি');
                    }
                });
                
                container.appendChild(card);
            });
        });
    }

    // নিয়ন অ্যানিমেশন এলোমেলো রঙের জন্য (আগের ফিচার রাখা)
    setInterval(() => {
        const neon = document.querySelector('.neon-overlay');
        if(neon) {
            const hue1 = Math.random() * 360;
            const hue2 = (hue1 + 120) % 360;
            neon.style.boxShadow = `inset 0 0 120px hsla(${hue1}, 100%, 50%, 0.3), 0 0 70px hsla(${hue2}, 100%, 50%, 0.2)`;
        }
    }, 800);

    // =================== টেলিগ্রাম সম্পূর্ণ বাদ ===================
    // * পূর্বের সকল Telegram script, setTimeout রিডাইরেক্ট, অথবা telegram লোগো সম্পূর্ণ মুছে ফেলা হয়েছে।
    // * শুধু ভিডিও কার্ড এবং ভিজুয়াল ইফেক্ট রাখা হয়েছে।
    // * কোনো স্বয়ংক্রিয় রিডাইরেক্ট নেই, ব্যবহারকারী নিজে ইচ্ছেমতো ছবিতে ক্লিক করবেন।
    
    // স্বাগত মেসেজ কনসোলে (ডিবাগ)
    console.log('✅ টেলিগ্রাম বাদ দেওয়া হয়েছে। শুধু ভিডিও গ্যালারি সক্রিয়।');
    
    // পেজ লোড হলে গ্যালারি রেন্ডার
    loadAllSections();

    // কীবোর্ড/মোবাইলের জন্য সহায়ক: কোনো মিস ক্লিক ইভেন্ট নেই
    // এছাড়াও রিডাইরেক্ট টাইমআউট সম্পূর্ণ বাদ, আগের কোড থেকে সরানো হয়েছে
    
    // বোনাস: কিছু কার্ডে মসৃণ স্ক্রল ইফেক্ট
    const sections = document.querySelectorAll('.section');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if(entry.isIntersecting) {
                entry.target.style.opacity = '1';
                entry.target.style.transform = 'translateY(0)';
            }
        });
    }, { threshold: 0.1 });
    
    sections.forEach(section => {
        section.style.opacity = '0';
        section.style.transform = 'translateY(20px)';
        section.style.transition = 'opacity 0.6s ease, transform 0.5s ease';
        observer.observe(section);
    });
    
    // হালকা ফ্যান্সি ইফেক্ট: ছবির কার্ডের উপর হলুদ আভা (শুধু সৌন্দর্য)
    const style = document.createElement('style');
    style.textContent = `
        .image-card {
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .image-card:active {
            transform: scale(0.98);
        }
        .hero {
            animation: fadeInUp 0.8s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .section-title {
            animation: glowText 2s infinite alternate;
        }
        @keyframes glowText {
            0% { text-shadow: 0 0 2px #ffaa44; }
            100% { text-shadow: 0 0 15px #ff44aa; }
        }
        footer {
            animation: fadeIn 1.2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    `;
    document.head.appendChild(style);

    // চমৎকার নোটিফিকেশন: যখন কোনো ভিডিও কার্ডে ক্লিক করে লিংক খোলা হবে (ঐচ্ছিক)
    // এটা কোনো টেলিগ্রাম না, শুধু ব্যবহারকারীর অভিজ্ঞতা উন্নত করতে
    let lastClickTime = 0;
    document.querySelectorAll('.image-card').forEach(card => {
        card.addEventListener('click', function(e) {
            const now = Date.now();
            if (now - lastClickTime < 300) return;
            lastClickTime = now;
            // কোনো এলার্ট না, শুধু লিংক খুলবে। নীরবে কাজ করবে।
        });
    });

    // ডায়নামিক রেসপন্সিভ গ্রিডের জন্য পুনরায় সাইজ লিসেনার
    window.addEventListener('resize', () => {
        // গ্রিড লেআউট স্বয়ংক্রিয়ভাবে CSS এ সামলাবে
    });
    
    // নিরাপত্তা ও ডিবাগ: কোনো অনাকাঙ্ক্ষিত রিডাইরেক্ট স্ক্রিপ্ট নেই (টেলিগ্রাম সম্পূর্ণ বাদ)
    // অতিরিক্ত যাচাই: আগের স্ক্রিপ্টে যে setTimeout ছিলো তা সম্পূর্ণ বাদ দেওয়া হয়েছে।
    // শুধুমাত্র ভিডিও গ্যালারি স্ট্যান্ডঅ্যালোন হিসেবে কাজ করবে।
    
    // মোবাইলে টাচ সাপোর্ট: স্পর্শে দ্রুত সাড়া
    if ('ontouchstart' in window) {
        document.querySelectorAll('.image-card').forEach(card => {
            card.addEventListener('touchstart', function(e) {
                this.style.transform = 'scale(0.98)';
            });
            card.addEventListener('touchend', function(e) {
                this.style.transform = '';
            });
        });
    }
    
    // একটি ছোট উন্নতি: পেজ লোড শেষে হিরো এলাকার নিচে আপডেটেড বার্তা
    const heroPara = document.querySelector('.hero p');
    if(heroPara) {
