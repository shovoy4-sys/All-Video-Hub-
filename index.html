        @keyframes bgRainbow {
            0% { background: linear-gradient(135deg, #0a0f1c, #1a0f2e, #0f1a2e); }
            20% { background: linear-gradient(135deg, #2e0a1a, #1a2e0a, #0a1a2e); }

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 998;
            animation: neonFlash 2s infinite alternate;

            cursor: pointer;
            transition: 0.3s;

        }

        .telegram-logo:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 20px #0088cc);
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .telegram-logo svg {
            width: 70px;
            height: 70px;
            filter: drop-shadow(0 0 8px #0088cc);
        }

        .telegram-text {
            font-size: 1rem;

        }

        .hero {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            backdrop-filter: blur(8px);
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .hero h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #ffaa44, #ff44aa, #44ffaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero p {
            font-size: 0.9rem;
            color: #ddd;
            margin-top: 8px;
        }

        .section-title {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 25px;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 50px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            border-left: 4px solid #ffaa44;
            border-right: 4px solid #ff44aa;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            justify-content: center;
        }

        /* প্লে বাটন কন্টেইনার */
        .image-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.15);
            position: relative; /* প্লে বাটনের পজিশন ঠিক করার জন্য */
            animation: borderGlow 2s infinite alternate;
        }

        /* ছবির ওপরের প্লে বাটন ডিজাইন */
        .image-card::after {
            content: '▶';
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid white;
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            z-index: 5;
            transition: 0.3s;
            backdrop-filter: blur(2px);
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .image-card:hover::after {
            background: rgba(255, 255, 255, 0.6);
            transform: translate(-50%, -50%) scale(1.1);
        }

        @keyframes borderGlow {
            from { border-color: rgba(255,100,100,0.3); box-shadow: 0 0 5px rgba(255,0,0,0.2); }
            to { border-color: rgba(100,255,100,0.7); box-shadow: 0 0 20px rgba(0,255,0,0.4); }
        }

        .image-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #ffaa44;
            box-shadow: 0 0 30px #ffaa44;
        }

        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            filter: brightness(0.8); /* ভিডিওর ভাব আনার জন্য একটু অন্ধকার করা */

            .section-title { font-size: 1.2rem; }

    function loadAllSections() {
        sectionsData.forEach(section => {
            const container = document.getElementById(section.name);
            if(!container) return;
            
            section.images.forEach((img, idx) => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.setAttribute('data-link', img.link);
                
                const image = document.createElement('img');
                image.src = img.url;
                image.alt = img.title;
                
                const titleDiv = document.createElement('div');
                titleDiv.className = 'card-title';
                titleDiv.textContent = `${img.title}`;
                
                card.appendChild(image);
                card.appendChild(titleDiv);
                
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const link = card.getAttribute('data-link');
                    if(link) window.open(link, '_blank');
                });
                
                container.appendChild(card);
            });
        });
    }

    const telegramBtn = document.getElementById('telegramBtn');

            const hue2 = (hue1 + 120) % 360;
            neon.style.boxShadow = `inset 0 0 120px hsla(${hue1}, 100%, 50%, 0.3), 0 0 70px hsla(${hue2}, 100%, 50%, 0.2)`;
        }
    }, 800);

    loadAllSections();
    startAutoRedirect();

    window.addEventListener('beforeunload', () => {
        if(redirectTimeout) clearTimeout(redirectTimeout);
    });
